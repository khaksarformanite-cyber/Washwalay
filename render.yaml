# render.yaml — deploy both services to Render with one file
# https://render.com/docs/blueprint-spec

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: washwalay-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://washwalay-client.onrender.com  # update to your frontend URL
    healthCheckPath: /health

  # ── React Frontend ────────────────────────────────────────────────────────
  - type: web
    name: washwalay-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://washwalay-server.onrender.com  # update to your backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
